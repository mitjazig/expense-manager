# Objavi na GitHub Pages (veja gh-pages)
# V repozitoriju: Settings → Pages → Source: Deploy from branch → gh-pages → / (root)

name: Objavi na GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Koda
        uses: actions/checkout@v4

      - name: Objavi na gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: '.github'
