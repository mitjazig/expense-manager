<!doctype html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Moji stroški</title>
  <meta name="theme-color" content="#0a0a0c" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-192.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap"
  />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="bg-gradient"></div>

  <header class="topbar">
    <div class="topbar__brand">
      <span class="topbar__logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 7H4a1 1 0 0 0-1 1v9a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2Z"/>
          <path d="M16 4H6a2 2 0 0 0-2 2v1"/>
          <circle cx="16" cy="13" r="1.4"/>
        </svg>
      </span>
      <h1 class="topbar__title">Moji stroški</h1>
    </div>
    <div class="topbar__actions">
      <button id="btn-export" class="btn btn--icon" type="button" aria-label="Izvozi podatke">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M5 21h14"/>
        </svg>
      </button>
      <button id="btn-import" class="btn btn--icon" type="button" aria-label="Uvozi podatke">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21V9"/><path d="M7 14l5-5 5 5"/><path d="M5 3h14"/>
        </svg>
      </button>
      <input type="file" id="import-file" accept="application/json" class="hidden" />
      <a href="seznam.html" class="btn btn--icon" aria-label="Seznam stroškov">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><circle cx="3.5" cy="6" r="1"/><circle cx="3.5" cy="12" r="1"/><circle cx="3.5" cy="18" r="1"/>
        </svg>
      </a>
      <a href="analitika.html" class="btn btn--ghost">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" class="btn__icon">
          <path d="M4 19V9"/><path d="M10 19V5"/><path d="M16 19v-7"/><path d="M4 19h16"/>
        </svg>
        Analitika
      </a>
      <button id="btn-install" class="btn btn--ghost hidden" type="button">Namesti</button>
    </div>
  </header>

  <main class="container">
    <section class="card card--form">
      <form id="expense-form" class="expense-form">
        <div class="amount-field">
          <label for="amount">Znesek</label>
          <div class="amount-field__row">
            <span class="amount-field__currency">€</span>
            <input type="number" id="amount" name="amount" step="0.01" min="0" inputmode="decimal" placeholder="0.00" required />
          </div>
        </div>

        <div class="field">
          <label>Kategorija</label>
          <input type="hidden" id="category" name="category" required />
          <div id="category-picker" class="category-picker"></div>
        </div>

        <div class="field">
          <label for="date">Datum</label>
          <input type="date" id="date" name="date" required />
        </div>

        <div class="field">
          <label for="note">Opis (neobvezno)</label>
          <textarea id="note" name="note" placeholder="npr. kosilo v mestu z ekipo" maxlength="300" rows="3"></textarea>
        </div>

        <div class="field">
          <label for="location">Lokacija (neobvezno)</label>
          <div class="location-field__row">
            <input type="text" id="location" name="location" placeholder="npr. Mercator, Koper" maxlength="120" />
            <button type="button" id="btn-locate" class="btn btn--icon" aria-label="Uporabi trenutno lokacijo">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 21s-6.5-5.6-6.5-11A6.5 6.5 0 0 1 12 3.5 6.5 6.5 0 0 1 18.5 10c0 5.4-6.5 11-6.5 11Z"/><circle cx="12" cy="10" r="2.3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="field">
          <label>Fotografija računa (neobvezno)</label>
          <input type="file" id="receipt-input" accept="image/*" capture="environment" class="hidden" />
          <button type="button" id="receipt-btn" class="btn btn--ghost receipt-add-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" class="btn__icon">
              <path d="M4 8h3l1.5-2h7L17 8h3a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1Z"/><circle cx="12" cy="13" r="3.5"/>
            </svg>
            Dodaj fotografijo
          </button>
          <div id="receipt-preview" class="receipt-preview hidden">
            <img id="receipt-preview-img" alt="Račun" />
            <button type="button" id="receipt-remove" class="expense-item__delete" aria-label="Odstrani fotografijo">×</button>
          </div>
          <p id="receipt-status" class="receipt-status hidden"></p>
        </div>

        <button type="submit" class="btn btn--primary">Dodaj strošek</button>
      </form>
    </section>

    <section class="month-nav">
      <button id="btn-prev-month" class="btn btn--icon" type="button" aria-label="Prejšnji mesec">‹</button>
      <span id="month-label" class="month-label"></span>
      <button id="btn-next-month" class="btn btn--icon" type="button" aria-label="Naslednji mesec">›</button>
    </section>

    <section class="card summary">
      <div class="summary__total">
        <span class="summary__total-label">Skupaj ta mesec</span>
        <span id="summary-total" class="summary__total-value">0,00 €</span>
      </div>
      <div id="summary-categories" class="summary__categories"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
